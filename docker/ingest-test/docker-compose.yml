version: '3'

services:
  some-redis:
    image: redis
    hostname: redis
    networks:
      default:
        aliases:
          - redis

  icat:
    build:
      context: icat
      args:
        postgres_password: testpassword
    hostname: catalog.example.org
    networks:
      default:
        aliases:
          - catalog.example.org

  irods-catalog-provider:
    build:
      context: provider
      args:
        irods_version: 4.3.0-1~bionic
        irods_version_major_minor: 4.3
        py_version: 3
    hostname: icat.example.org
    networks:
      default:
        aliases:
          - icat.example.org
    volumes:
      - "/tmp/mountdir:/tmp/testdir:ro"
    depends_on:
      - icat

  ingest-test:
    build:
      context: test
    environment:
      - "PIP_PACKAGE=git+https://github.com/alanking/irods_capability_automated_ingest@821beea70e03b9a9b5a56fb1311a96d3db742221"
      - "TEST_CASE=irods_capability_automated_ingest.test.test_irods_sync.test_ingest_options"
      - "IRODS_PORT"
      - "IRODS_HOST"
      - "IRODS_USER_NAME"
      - "IRODS_ZONE_NAME"
      - "IRODS_ENVIRONMENT_FILE"
      - "IRODS_PASSWORD"
    volumes:
      - "/tmp/mountdir:/tmp/testdir"
    depends_on:
      - some-redis
      - irods-catalog-provider
